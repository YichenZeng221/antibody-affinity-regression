  best_val_mae: outputs/andd_antibody_v2_stratified/multiseed/unweighted_seed42/test_predictions_best_val_mae.csv
  best_val_spearman: outputs/andd_antibody_v2_stratified/multiseed/unweighted_seed42/test_predictions_best_val_spearman.csv
