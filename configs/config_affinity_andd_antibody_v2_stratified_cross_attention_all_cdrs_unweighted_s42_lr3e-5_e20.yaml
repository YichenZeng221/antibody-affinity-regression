# Multi-seed control: unweighted all-CDR cross-attention, seed 42, 20 epochs.
# tail_weight == regular_weight == 1.0 makes this ordinary MSE while preserving identical checkpoint policy.
model_name: facebook/esm2_t6_8M_UR50D
task_type: affinity_cross_attention_regression_multiseed_control
target_column: neg_log10_affinity_candidate
input_mode: all_cdrs_cross_attention_antigen
mode_name: andd_stratified_unweighted_s42
experiment_label: Unweighted s42
experiment_kind: unweighted
report_title: "ANDD Stratified Multi-Seed Control: Unweighted Cross-Attention Seed 42"
multiseed_group: unweighted
multiseed_seed: 42
train_csv: data/processed_affinity/expanded_affinity_antibody_v2_stratified/train.csv
val_csv: data/processed_affinity/expanded_affinity_antibody_v2_stratified/val.csv
test_csv: data/processed_affinity/expanded_affinity_antibody_v2_stratified/test.csv
output_dir: outputs/andd_antibody_v2_stratified/multiseed/unweighted_seed42
training_history_path: outputs/andd_antibody_v2_stratified/multiseed/unweighted_seed42/training_history.csv
